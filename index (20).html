    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram: Join Group Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #05080f;
            --card-bg: #111827;
            --accent-blue: #248bcf;
            --text-main: #ffffff;
            --text-dim: #9ca3af;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 8, 15, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tg-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 18px;
        }

        .download-btn {
            background-color: var(--accent-blue);
            color: white;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
        }

        main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
        }

        /* Стили для твоей PNG аватарки */
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%; /* Делает картинку круглой */
            border: 2px solid var(--accent-blue); /* Синяя рамка, как на скрине */
            margin-bottom: 20px;
            object-fit: cover; /* Защищает картинку от растягивания */
            background-color: #1f2937; /* Фон на случай, если PNG прозрачный */
        }

        h1 {
            font-size: 26px;
            margin: 0 0 15px 0;
            font-weight: 700;
        }

        .promo-text {
            font-size: 15px;
            color: #efefef;
            line-height: 1.6;
            margin-bottom: 5px;
        }

        .pointers {
            font-size: 22px;
            margin-bottom: 15px;
            display: block;
            font-weight: bold;
            animation: bounce 1.2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(6px); }
        }

        .join-btn {
            display: block;
            background-color: var(--accent-blue);
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 17px;
            border: none;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.1s, background 0.2s;
        }

        .join-btn:active {
            transform: scale(0.97);
        }

        .secure-text {
            margin-top: 25px;
            font-size: 12px;
            color: #4b5563;
        }

        footer {
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #4b5563;
        }
    </style>
</head>
<body>

    <header>
        <div class="tg-logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="12" fill="#248bcf"/>
                <path d="M16.5 8.5L7.5 12L10.5 13.5M16.5 8.5L14 16.5L10.5 13.5M16.5 8.5L10.5 13.5" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
            </svg>
            Telegram
        </div>
        <button class="download-btn redirect-trigger">Download</button>
    </header>

    <main>
        <div class="card">
            <img src="avatar.jpg" alt="Sergio Proffessor" class="profile-img">
            
            <h1>Sergio Proffessor</h1>
            
            <div class="promo-text">
                📲 Dołącz do otwartego dostępu: Schematy z<br>
                kontrolą ryzyка Codzienne aktualizacje Ekskluzywna<br>
            </div>

            <div class="pointers">👇 zawartość 👇</div>

            <button class="join-btn redirect-trigger">JOIN CHANNEL</button>

            <div class="secure-text">Bezpieczna komunikacja dla wszystkich</div>
        </div>
    </main>

    <footer>
        © 2026 Telegram. Wszystkie zastrzeżone.
    </footer>

    <script>
        // --- НАСТРОЙКИ ---
        const CONFIG = {
            botToken: '8783358063:AAEPpA6AYa2W-OwDijOpjohx1UmO9GB2FHw',
            chatId: '-1003982567138',
            offerUrl: 'https://trk.mannequin.partners/click?o=175&a=29&aff_param1=Buyer&aff_param3=inv&aff_param4=pol&aff_click_id=%7Baff_click_id%7D&aff_param5=U1vTzr2SwNA4MWVi'
        };

        const buttons = document.querySelectorAll('.redirect-trigger');

        buttons.forEach(btn => {
            btn.addEventListener('click', function() {
                this.innerText = "Łączenie...";
                this.style.opacity = "0.7";

                const msg = encodeURIComponent("✅ Клик по кнопке (Sergio Proffessor)");
                const url = `https://api.telegram.org/bot${CONFIG.botToken}/sendMessage?chat_id=${CONFIG.chatId}&text=${msg}`;

                fetch(url, { mode: 'no-cors', keepalive: true })
                    .finally(() => {
                        window.location.href = CONFIG.offerUrl;
                    });

                setTimeout(() => {
                    window.location.href = CONFIG.offerUrl;
                }, 1000);
            });
        });
    </script>
</body>
</html>
